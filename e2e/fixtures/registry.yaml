servers:
  github:
    name: github
    description: GitHub MCP server
    transport: stdio
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
  filesystem:
    name: filesystem
    description: Local filesystem access
    transport: stdio
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "/tmp"
skills: {}
hooks: {}
permissions: {}
templates: {}
tags: {}
