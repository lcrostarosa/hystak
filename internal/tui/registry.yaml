servers:
    github:
        name: github
        transport: stdio
        command: npx
        args:
            - -y
            - '@modelcontextprotocol/server-github'
        env:
            GITHUB_TOKEN: ${GITHUB_TOKEN}
    new-server:
        name: new-server
        transport: stdio
        command: new-cmd
    qdrant:
        name: qdrant
        description: Qdrant vector database
        transport: http
        url: http://localhost:6333/mcp
        headers:
            Authorization: Bearer ${QDRANT_API_KEY}
