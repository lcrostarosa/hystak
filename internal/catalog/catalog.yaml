mcps:
  - name: github
    description: "GitHub MCP - repos, issues, PRs, code search"
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"
    category: developer-tools
    popular: true

  - name: filesystem
    description: "Read/write access to specified directories"
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/"]
    category: file-system
    popular: true

  - name: fetch
    description: "Fetch web pages and convert to markdown"
    transport: stdio
    command: uvx
    args: ["mcp-server-fetch"]
    category: web
    popular: true

  - name: brave-search
    description: "Web search via Brave Search API"
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-brave-search"]
    env:
      BRAVE_API_KEY: "${BRAVE_API_KEY}"
    category: search

  - name: memory
    description: "Persistent memory using a knowledge graph"
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-memory"]
    category: knowledge

  - name: postgres
    description: "Read-only PostgreSQL database access"
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-postgres"]
    env:
      POSTGRES_URL: "${POSTGRES_URL}"
    category: database

  - name: sqlite
    description: "SQLite database access and analysis"
    transport: stdio
    command: uvx
    args: ["mcp-server-sqlite"]
    category: database

  - name: puppeteer
    description: "Browser automation and web scraping"
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-puppeteer"]
    category: web

  - name: sequential-thinking
    description: "Dynamic problem-solving through thought sequences"
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-sequential-thinking"]
    category: reasoning

  - name: qdrant
    description: "Qdrant vector database for semantic search"
    transport: stdio
    command: uvx
    args: ["mcp-server-qdrant"]
    env:
      QDRANT_URL: "${QDRANT_URL}"
      COLLECTION_NAME: "${COLLECTION_NAME}"
    category: database

skills:
  - name: code-review
    description: "Systematic code review with security and quality focus"
    category: development
    content: |
      # Code Review
      When reviewing code, check for:
      1. Security vulnerabilities (injection, XSS, auth issues)
      2. Error handling completeness
      3. Performance concerns (N+1 queries, unbounded loops)
      4. Test coverage gaps
      5. API contract adherence
      Provide specific line references and severity ratings.

  - name: test-writer
    description: "Generate comprehensive test suites"
    category: development
    content: |
      # Test Writer
      When writing tests:
      1. Cover happy path, edge cases, and error cases
      2. Use table-driven tests where appropriate
      3. Mock external dependencies
      4. Test boundary values
      5. Verify error messages are meaningful
      Name tests descriptively: Test<Function>_<Scenario>

  - name: documentation
    description: "Generate clear technical documentation"
    category: writing
    content: |
      # Documentation
      When documenting code or systems:
      1. Start with a one-paragraph summary
      2. List prerequisites and dependencies
      3. Provide setup/installation steps
      4. Include usage examples with expected output
      5. Document configuration options
      6. Add troubleshooting section for common issues

  - name: refactor
    description: "Systematic refactoring with safety checks"
    category: development
    content: |
      # Refactoring
      When refactoring:
      1. Identify the code smell or improvement target
      2. Ensure tests exist before changing anything
      3. Make small, incremental changes
      4. Run tests after each change
      5. Preserve public API contracts unless explicitly changing them
      6. Update documentation if behavior changes

  - name: security-audit
    description: "Security-focused code analysis"
    category: security
    content: |
      # Security Audit
      Analyze code for:
      1. OWASP Top 10 vulnerabilities
      2. Hardcoded credentials or secrets
      3. Input validation gaps
      4. Authentication/authorization flaws
      5. Insecure dependencies
      6. Data exposure risks
      Rate each finding: Critical, High, Medium, Low.

hooks:
  - name: lint-on-write
    event: PostToolUse
    matcher: Write
    command: "echo 'File written: review for linting'"
    timeout: 5000
    category: quality

  - name: test-reminder
    event: PostToolUse
    matcher: Write
    command: "echo 'Remember to run tests after changes'"
    timeout: 3000
    category: quality

  - name: format-check
    event: PreToolUse
    matcher: Write
    command: "echo 'Ensure code is formatted before writing'"
    timeout: 3000
    category: quality

permissions:
  - name: allow-bash
    rule: "Bash(*)"
    type: allow
    category: permissive

  - name: allow-web-fetch
    rule: "WebFetch(*)"
    type: allow
    category: web

  - name: allow-github
    rule: "WebFetch(domain:github.com)"
    type: allow
    category: web

  - name: deny-rm-rf
    rule: "Bash(rm -rf *)"
    type: deny
    category: safety

  - name: allow-read-only
    rule: "Read(*)"
    type: allow
    category: restrictive
